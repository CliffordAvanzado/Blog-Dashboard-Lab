<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Dashboard – Week 8-10 Lab</title>

  <!-- Vue.js 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #F3F4F6;
      color: #374151;
    }

    header {
      background: #0A2342;
      color: white;
      padding: 20px 40px;
    }

    header h1 {
      font-size: 1.6rem;
    }

    header p {
      font-size: 0.9rem;
      color: #93C5FD;
      margin-top: 4px;
    }

    .toolbar {
      background: white;
      padding: 16px 40px;
      border-bottom: 2px solid #E5E7EB;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar input,
    .toolbar select {
      padding: 8px 12px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
    }

    .main {
      padding: 30px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      border-top: 3px solid #028090;
    }

    .card h3 {
      font-size: 1rem;
      color: #0A2342;
      margin: 10px 0;
    }

    .card p {
      font-size: 0.87rem;
      color: #6B7280;
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      background: #EFF6FF;
      color: #1E40AF;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.78rem;
    }

    .author {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #028090;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #6B7280;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

  <div id="app">

    <!-- Header -->
    <header>
      <h1>Blog Dashboard</h1>
      <p>Web Systems Lab – Weeks 8 to 10</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">

      <strong>
        Showing: {{ filteredPosts.length }} / {{ posts.length }} posts
      </strong>

      <strong>
        Authors: {{ users.length }}
      </strong>

      <!-- Search -->
      <input
        v-model="search"
        type="text"
        placeholder="Search posts..."
      />

      <!-- User Filter -->
      <select v-model.number="selectedUser">
        <option :value="0">All Authors</option>

        <option
          v-for="user in users"
          :key="user.id"
          :value="user.id"
        >
          {{ user.name }}
        </option>
      </select>

    </div>

    <!-- Main Content -->
    <div class="main">

      <!-- Loading -->
      <p v-if="loading" class="loading">
        Loading posts from REST API...
      </p>

      <!-- Posts Grid -->
      <div v-else class="grid">

        <div
          v-for="post in filteredPosts"
          :key="post.id"
          class="card"
        >

          <span class="tag">
            Post #{{ post.id }}
          </span>

          <h3>{{ post.title }}</h3>

          <p>{{ post.body }}</p>

          <p class="author">
            By: {{ getAuthor(post.userId) }}
          </p>

        </div>

      </div>

    </div>

  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({

      setup() {

        // Reactive State
        const posts = ref([]);
        const users = ref([]);
        const loading = ref(true);

        const search = ref('');
        const selectedUser = ref(0);

        // Fetch API Data
        onMounted(async () => {

          try {

            // Fetch posts + users together
            const [postsRes, usersRes] = await Promise.all([
              fetch('https://jsonplaceholder.typicode.com/posts'),
              fetch('https://jsonplaceholder.typicode.com/users')
            ]);

            posts.value = await postsRes.json();
            users.value = await usersRes.json();

          } catch (error) {

            console.error('API fetch failed:', error);

          } finally {

            loading.value = false;

          }

        });

        // Get author name from userId
        const getAuthor = (userId) => {

          const user = users.value.find(
            u => u.id === userId
          );

          return user ? user.name : 'Unknown Author';
        };

        // Search + Filter
        const filteredPosts = computed(() => {

          let result = posts.value;

          // Filter by author
          if (selectedUser.value !== 0) {

            result = result.filter(
              p => p.userId === selectedUser.value
            );
          }

          // Filter by search text
          if (search.value.trim()) {

            const q = search.value.toLowerCase();

            result = result.filter(post =>
              post.title.toLowerCase().includes(q) ||
              post.body.toLowerCase().includes(q)
            );
          }

          return result;
        });

        return {
          posts,
          users,
          loading,
          search,
          selectedUser,
          filteredPosts,
          getAuthor
        };
      }

    }).mount('#app');
  </script>

</body>
</html>
